[build]
  command = "rm -rf node_modules/.tmp && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20.18.0"
  NPM_FLAGS = "--legacy-peer-deps"

[dev]
  command = "vite"
  targetPort = 5173
  port = 8888
  publish = "dist"
  autoLaunch = false

# ─── HEADERS ──────────────────────────────────────────────────────────────────

# Security headers for ALL responses
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

# HTML entry point: MUST NOT be cached by browser or CDN
# This prevents stale HTML from referencing deleted chunk hashes after deploy
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

# Same for root path (Netlify serves index.html for /)
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Fingerprinted assets: cache aggressively (1 year) — hash changes on every build
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── REDIRECTS ────────────────────────────────────────────────────────────────

# WhatsApp AI Webhook - clean URL for Green API
[[redirects]]
  from = "/api/whatsapp-webhook"
  to = "/.netlify/functions/whatsapp-ai-webhook"
  status = 200

[[redirects]]
  from = "/api/whatsapp-webhook/*"
  to = "/.netlify/functions/whatsapp-ai-webhook"
  status = 200

# ─── SCHEDULED FUNCTIONS ──────────────────────────────────────────────────────

[functions."cancel-unpaid-nexi-bookings"]
  schedule = "*/5 * * * *"

# DR7 Club — daily 0.1% wallet interest accrual (each row card-paid principal × 0.001)
[functions."accrue-club-wallet-interest"]
  schedule = "30 1 * * *"

# DR7 Club — monthly payout of accrued interest on the 1st
[functions."payout-club-wallet-interest"]
  schedule = "0 2 1 * *"

# Multe — aggiornamento mensile rubrica enti accertatori dal registro IPA
# (1 del mese, 03:00 UTC). Logica in sync-ipa.ts (runSync), invocabile a mano.
[functions."sync-ipa-cron"]
  schedule = "0 3 1 * *"

# Fornitori — daily 8:00 Rome alerts (scadenze, bolle mancanti)
[functions."fornitori-alerts-cron"]
  schedule = "0 6 * * *"

# Fornitori — nightly sync of all fornitori invoices from Aruba SDI
# (03:00 Rome estate / 02:00 inverno). So when admin opens a fornitore in
# the morning, fatture are already there. Throttled internally.
[functions."fornitori-fatture-sync-cron"]
  schedule = "0 1 * * *"

# 2026-06-04: DISABILITATO per evitare DOPPIO INVIO. La "Richiesta prolungamento
# SUPERCAR" è ora gestita dalla Programmazione (Messaggi di Sistema Pro →
# before_dropoff 24h alle 09:00) tramite process-scheduled-system-messages-cron,
# che ha in allowlist pro_custom_richiesta_prolungamento_supercar_1777711737784.
# Tenere questo cron acceso significherebbe inviare il messaggio DUE volte
# (qui alle 18:00 + dalla Programmazione alle 09:00). La function resta sul
# filesystem come trigger manuale, ma SENZA schedule non viene registrata.
# [functions."rental-extension-supercar-cron"]
#   schedule = "0 16,17 * * *"

# Wallet auto-recharge — fires hourly at :00. Per-customer gating on
# wallet_recurring.day == today AND wallet_recurring.hour == current Rome
# hour so each customer is credited once per month at their chosen time.
# Idempotent via last_run_at.
[functions."process-wallet-auto-recharges-cron"]
  schedule = "0 * * * *"

# Allerta Meteo automatica (2026-07-18) — ogni ora controlla il meteo reale di
# Cagliari (Open-Meteo) e invia l'Allerta Meteo se attivo il toggle "Cron ON"
# del template. TERRA=pioggia, MARE=pioggia o vento forte. Una volta per episodio,
# solo 08–21. Toggle per canale da Messaggi di Sistema Pro (pro_allerta_meteo /
# pro_allerta_meteo_mare).
[functions."weather-alert-cron"]
  schedule = "0 * * * *"

# Nexi preauth auto-refresh — riattivato 2026-05-13.
# Cron giornaliero che rinnova le pre-autorizzazioni a lungo termine
# (durata > 7 giorni) ogni 6 giorni. Strategia void-first:
#   1) VOID dell'auth attiva (libera il blocco sulla carta)
#   2) Crea NUOVO link paybylink USE_CONTRACT EXPLICIT
#   3) Riga passa a 'preauth_pending_refresh_confirm', il cliente deve
#      cliccare il link entro 48h per confermare
# Cosi\' non si accumulano hold multipli sulla stessa carta. Se void
# fallisce, NON si crea la nuova auth (retry domani).
[functions."nexi-preauth-refresh-cron"]
  schedule = "30 3 * * *"

# Marketing campaigns — every 2 min, materialise scheduled/recurring campaigns
# whose scheduled_at has passed and pump the chunked send loop server-side.
# 25s working budget per tick (out of the 30s scheduled-function timeout) so
# each tick sends ~3 messages under the 7s anti-spam throttle (~90 msg/hour).
[functions."process-scheduled-campaigns-cron"]
  schedule = "*/2 * * * *"

# Messaggi di Sistema Pro — DISABILITATO 2026-05-13 dopo incident del
# mattino (mille messaggi randomici alla direzione). Il fix lato sender
# e' gia' deployato (commit 93457eaa: niente piu' fallback alla direzione)
# ma teniamo il cron offline finche' non rivediamo il flusso end-to-end:
#   - alterare system_message_send_log.booking_id da UUID a TEXT (la
#     dedupe per entity scadenza/inactive falliva silenziosamente)
#   - audit di quali template hanno is_enabled=true
#   - test manuale con un sottoinsieme prima di riattivare
# 2026-05-22 REVERT: direzione NON vuole che questo cron giri (rischio invii
#   randomici: decine di template sono is_automatic+is_enabled per errore).
# 2026-05-30 RIATTIVATO IN SICUREZZA — solo "promemoria ritiro veicolo".
#   Il cron ha un'ALLOWLIST hardcoded di default = SOLO il promemoria ritiro
#   (pro_custom_promemoria_ritiro_veicolo_1778334892254), quindi funziona al
#   deploy senza toccare le env. La env SCHEDULED_MSGS_ALLOWLIST (CSV di
#   message_key) può sovrascrivere l'elenco se in futuro servono altri template.
#   NON esiste modalità "manda tutto": allowlist vuota ⇒ nessun invio (fail-safe
#   anti-incident del 2026-05-13). Aggiungere chiavi solo dopo verifica.
[functions."process-scheduled-system-messages-cron"]
  schedule = "*/8 * * * *"

# Sollecito pagamento — auto-resend del promemoria di pagamento ogni 48h ai
# clienti con debito ancora aperto. Il PRIMO sollecito parte manualmente da
# "In attesa di pagamento"; il cron continua il follow-up (max 3 totali per
# debito, stop a count>=3). La finestra 48h è enforced nell'handler, quindi
# girare ogni 6h è sicuro (nessun doppio invio).
[functions."sollecito-pagamento-cron"]
  schedule = "0 */6 * * *"

# DR7 Privilege — DISABILITATO dopo invio massivo non voluto.
# Lo schedule è commentato così Netlify NON registra il cron.
# DR7 Privilege — niente cron periodico: il codice viene inviato
# real-time dal callback Nexi (e da segna-pagato admin) appena la
# fattura risulta pagata. La function dr7-privilege-cron resta
# disponibile come catch-all manuale.

# SPA catch-all: ONLY for non-asset routes
# Netlify serves existing files first, then applies redirects.
# When a fingerprinted chunk is missing (stale HTML after deploy),
# this redirect serves index.html with 200 — causing the MIME error.
# The fix is NOT in the redirect (Netlify doesn't support conditions here),
# but in the cache headers above: index.html is never cached, so the browser
# always gets the latest HTML with correct chunk references.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
