[build]
  command = "rm -rf node_modules/.tmp && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20.18.0"
  NPM_FLAGS = "--legacy-peer-deps"

[dev]
  command = "vite"
  targetPort = 5173
  port = 8888
  publish = "dist"
  autoLaunch = false

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

# Prevent caching index.html so users always get fresh asset references
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Allow long caching for hashed assets (filenames change on each build)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# WhatsApp AI Webhook - clean URL for Green API
[[redirects]]
  from = "/api/whatsapp-webhook"
  to = "/.netlify/functions/whatsapp-ai-webhook"
  status = 200

[[redirects]]
  from = "/api/whatsapp-webhook/*"
  to = "/.netlify/functions/whatsapp-ai-webhook"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
