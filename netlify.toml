[build]
  command = "rm -rf node_modules/.tmp && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18.18.0"
  NPM_FLAGS = "--legacy-peer-deps"

[dev]
  command = "vite"
  targetPort = 5173
  port = 8888
  publish = "dist"
  autoLaunch = false

# WhatsApp AI Webhook - clean URL for Green API
[[redirects]]
  from = "/api/whatsapp-webhook"
  to = "/.netlify/functions/whatsapp-ai-webhook"
  status = 200

[[redirects]]
  from = "/api/whatsapp-webhook/*"
  to = "/.netlify/functions/whatsapp-ai-webhook"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
