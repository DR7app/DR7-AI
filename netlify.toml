[build]
  command = "rm -rf node_modules/.tmp && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20.18.0"
  NPM_FLAGS = "--legacy-peer-deps"

[dev]
  command = "vite"
  targetPort = 5173
  port = 8888
  publish = "dist"
  autoLaunch = false

# ─── HEADERS ──────────────────────────────────────────────────────────────────

# Security headers for ALL responses
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

# HTML entry point: MUST NOT be cached by browser or CDN
# This prevents stale HTML from referencing deleted chunk hashes after deploy
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

# Same for root path (Netlify serves index.html for /)
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Fingerprinted assets: cache aggressively (1 year) — hash changes on every build
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── REDIRECTS ────────────────────────────────────────────────────────────────

# WhatsApp AI Webhook - clean URL for Green API
[[redirects]]
  from = "/api/whatsapp-webhook"
  to = "/.netlify/functions/whatsapp-ai-webhook"
  status = 200

[[redirects]]
  from = "/api/whatsapp-webhook/*"
  to = "/.netlify/functions/whatsapp-ai-webhook"
  status = 200

# ─── SCHEDULED FUNCTIONS ──────────────────────────────────────────────────────

[functions."cancel-unpaid-nexi-bookings"]
  schedule = "*/5 * * * *"

# DR7 Club — daily 0.1% wallet interest accrual (each row card-paid principal × 0.001)
[functions."accrue-club-wallet-interest"]
  schedule = "30 1 * * *"

# DR7 Club — monthly payout of accrued interest on the 1st
[functions."payout-club-wallet-interest"]
  schedule = "0 2 1 * *"

# Fornitori — daily 8:00 Rome alerts (scadenze, bolle mancanti)
[functions."fornitori-alerts-cron"]
  schedule = "0 6 * * *"

# Fornitori — nightly sync of all fornitori invoices from Aruba SDI
# (03:00 Rome estate / 02:00 inverno). So when admin opens a fornitore in
# the morning, fatture are already there. Throttled internally.
[functions."fornitori-fatture-sync-cron"]
  schedule = "0 1 * * *"

# Supercar rental extension reminder — fires at 18:00 Rome the day before drop-off
# for rentals on exotic vehicles with duration ≥ 3 days. Two times cover both
# CEST (16 UTC) and CET (17 UTC); the function gates inside on Rome hour == 18.
[functions."rental-extension-supercar-cron"]
  schedule = "0 16,17 * * *"

# DR7 Privilege — codice sconto 10% post-pagamento lavaggio (15gg).
# Polls car_wash bookings paid but not yet rewarded. Idempotent.
# (Noleggio is handled inline in signature-complete.ts after firma contratto.)
[functions."dr7-privilege-cron"]
  schedule = "*/5 * * * *"

# SPA catch-all: ONLY for non-asset routes
# Netlify serves existing files first, then applies redirects.
# When a fingerprinted chunk is missing (stale HTML after deploy),
# this redirect serves index.html with 200 — causing the MIME error.
# The fix is NOT in the redirect (Netlify doesn't support conditions here),
# but in the cache headers above: index.html is never cached, so the browser
# always gets the latest HTML with correct chunk references.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
