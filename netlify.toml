[build]
  command = "rm -rf node_modules/.tmp && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18.18.0"
  NPM_FLAGS = "--legacy-peer-deps"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Scheduled Functions
[[functions]]
  name = "check-birthdays"
  schedule = "0 9 * * *"  # Daily at 9:00 AM (cron format)
